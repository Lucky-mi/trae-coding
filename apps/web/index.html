<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WordGauge - Professional Vocab Assessment</title>
  </head>
  <body class="bg-panel-950 min-h-screen relative text-white antialiased">
    <!-- Base gradient -->
    <div class="fixed inset-0 z-[-2] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-panel-900 via-panel-950 to-black pointer-events-none"></div>
    
    <!-- Ambient glows -->
    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none opacity-40 mix-blend-screen">
      <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-brand-600/20 blur-[120px]"></div>
      <div class="absolute top-[60%] -right-[10%] w-[60%] h-[60%] rounded-full bg-fuchsia-600/20 blur-[140px]"></div>
    </div>

    <!-- Noise texture overlay -->
    <div class="fixed inset-0 z-[-1] opacity-[0.015] pointer-events-none mix-blend-overlay" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E');"></div>

    <div id="root" class="relative z-0 min-h-screen flex flex-col"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
